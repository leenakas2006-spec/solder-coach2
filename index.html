</head>

<body>

<h1>🛠️ SolderCoach AI</h1>

<button onclick="init()">تشغيل الكاميرا</button>

<div id="webcam-container"></div>
<div id="result">بانتظار التشغيل...</div>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/ElUsFG2gf/";

let model, webcam;

async function init() {
    model = await tmImage.load(URL + "model.json", URL + "metadata.json");

    webcam = new tmImage.Webcam(300, 300, true);
    await webcam.setup();
    await webcam.play();

    document.getElementById("webcam-container").innerHTML = "";
    document.getElementById("webcam-container").appendChild(webcam.canvas);

    window.requestAnimationFrame(loop);
}

async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict() {
    const prediction = await model.predict(webcam.canvas);

    prediction.sort((a, b) => b.probability - a.probability);

    const top = prediction[0];
    const resultBox = document.getElementById("result");

    let label = top.className.toLowerCase();
    let percent = (top.probability * 100).toFixed(1);

    if (label === "good") {
        resultBox.className = "pass";
        resultBox.innerHTML = "✅ Good Joint (" + percent + "%)";
    } 
    else if (label === "solder") {
        resultBox.className = "pass";
        resultBox.innerHTML = "🛠️ Solder Detected (" + percent + "%)";
    } 
    else if (label === "in") {
        resultBox.className = "fail";
        resultBox.innerHTML = "⚠️ Incomplete Joint (" + percent + "%)";
    } 
    else if (label === "ex") {
        resultBox.className = "fail";
        resultBox.innerHTML = "❌ Excess Solder (" + percent + "%)";
    }
}
</script>

</body>
